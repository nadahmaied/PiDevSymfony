# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    gemini_api_key: '%env(GEMINI_API_KEY)%'
    groq_api_key: '%env(GROQ_API_KEY)%'
    mission_images_directory: '%kernel.project_dir%/public/uploads/missions'
    openai_model_default: 'gpt-4o'
    grok_model_default: 'grok-2-1212'
    ollama_model_default: 'llama3.2'
    site_base_url: '%env(SITE_BASE_URL)%'
    ml_model_path: '%kernel.project_dir%/var/ml/recommendation_model.json'
    forum_ai_api_key: '%env(FORUM_AI_API_KEY)%'
    forum_ai_api_url: '%env(FORUM_AI_API_URL)%'
    forum_ai_model: '%env(FORUM_AI_MODEL)%'
    volunteer_ai_api_key: '%env(VOLUNTEER_AI_API_KEY)%'
    volunteer_ai_api_url: '%env(VOLUNTEER_AI_API_URL)%'
    volunteer_ai_model: '%env(VOLUNTEER_AI_MODEL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Document verification service with Gemini API key
    App\Service\DocumentVerificationService:
        arguments:
            $apiKey: '%gemini_api_key%'

    # Chatbot controller with Groq API key
    App\Controller\ChatbotController:
        arguments:
            $groqApiKey: '%groq_api_key%'

    App\Service\MlModelScoringService:
        arguments:
            $modelPath: '%ml_model_path%'

    App\Command\ExportRecommendationTrainingDataCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\TrainRecommendationModelCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $modelPath: '%ml_model_path%'

    App\Service\ForumAiAssistant:
        arguments:
            $apiKey: '%forum_ai_api_key%'
            $apiUrl: '%forum_ai_api_url%'
            $model: '%forum_ai_model%'

    App\Service\ForumModerationAiService:
        arguments:
            $apiKey: '%forum_ai_api_key%'
            $apiUrl: '%forum_ai_api_url%'
            $model: '%forum_ai_model%'

    App\Service\VolunteerAiAssistant:
        arguments:
            $apiKey: '%volunteer_ai_api_key%'
            $apiUrl: '%volunteer_ai_api_url%'
            $model: '%volunteer_ai_model%'

    App\Service\ApplicationsSummaryAiService:
        arguments:
            $apiKey: '%volunteer_ai_api_key%'
            $apiUrl: '%volunteer_ai_api_url%'
            $model: '%volunteer_ai_model%'
            
    App\Service\SmsService:
        arguments:
            $twilioSid:   '%env(TWILIO_SID)%'
            $twilioToken: '%env(TWILIO_TOKEN)%'
            $twilioFrom:  '%env(TWILIO_FROM)%'

    App\Controller\OrdonnanceController:
        bind:
            $siteBaseUrl: '%site_base_url%'

    App\Controller\PatientController:
        bind:
            $siteBaseUrl: '%site_base_url%'

    App\Service\PrescriptionMailerService:
        arguments:
            $siteBaseUrl: '%site_base_url%'

    App\Service\ChatbotService:
        arguments:
            $openAiApiKey: '%env(default::OPENAI_API_KEY)%'
            $openAiModel: '%env(default:openai_model_default:OPENAI_MODEL)%'
            $groqApiKey: '%env(default::GROQ_API_KEY)%'
            $grokApiKey: '%env(default::GROK_API_KEY)%'
            $geminiApiKey: '%env(default::GEMINI_API_KEY)%'
            $ollamaUrl: '%env(default::OLLAMA_URL)%'
            $ollamaModel: '%env(default:ollama_model_default:OLLAMA_MODEL)%'

    App\Service\MedicalAiService:
        arguments:
            $cache: '@cache.app'
            $openAiApiKey: '%env(default::OPENAI_API_KEY)%'
            $openAiModel: '%env(default:openai_model_default:OPENAI_MODEL)%'
            $grokApiKey: '%env(default::GROK_API_KEY)%'
            $grokModel: '%env(default:grok_model_default:GROK_MODEL)%'
            $geminiApiKey: '%env(default::GEMINI_API_KEY)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\TextToSpeechService:
        arguments:
            $apiKey: '%env(default::AZURE_TTS_KEY)%'
            $region: '%env(default::AZURE_TTS_REGION)%'
