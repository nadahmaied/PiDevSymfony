security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_MEDECIN:     [ROLE_USER]
        ROLE_ADMIN:       [ROLE_USER, ROLE_MEDECIN]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: front_login
                check_path: front_login
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: front_logout
                target: app_home

    access_control:
        - { path: ^/forgot-password,      roles: PUBLIC_ACCESS }
        - { path: ^/reset-password,       roles: PUBLIC_ACCESS }
        - { path: ^/(login|signup),       roles: PUBLIC_ACCESS }
        - { path: ^/admin/(login|signup), roles: PUBLIC_ACCESS }
        - { path: ^/admin/super-admin,    roles: ROLE_SUPER_ADMIN }
        - { path: ^/admin,  roles: [ROLE_ADMIN, ROLE_MEDECIN] }
        - { path: ^/back,   roles: ROLE_MEDECIN }
        - { path: ^/showAllRdvBack, roles: ROLE_MEDECIN }
        - { path: ^/account, roles: ROLE_USER }
        - { path: ^/$,       roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10